<!DOCTYPE html>
<html lang="sv">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin</title>
  <style>
    body { font-family: sans-serif; max-width: 800px; margin: 2rem auto; padding: 0 1rem; }
    h1, h2 { margin-bottom: 1rem; }
    form { display: flex; flex-direction: column; gap: 0.5rem; max-width: 360px; margin-bottom: 2rem; }
    input { padding: 0.4rem; font-size: 1rem; }
    button { padding: 0.4rem; cursor: pointer; }
    .course-group { margin-bottom: 1.5rem; }
    .course-group h3 { margin-bottom: 0.4rem; border-bottom: 1px solid #ccc; padding-bottom: 0.2rem; }
    table { border-collapse: collapse; width: 100%; }
    td, th { text-align: left; padding: 0.3rem 0.6rem; border-bottom: 1px solid #eee; }
    th { font-weight: bold; }
  </style>
</head>
<body>
  <h1>Admin</h1>

  <h2>Skapa ny kurs</h2>
  <form id="course-form">
    <input name="title"        placeholder="Titel"         required />
    <input name="courseNumber" placeholder="Kursnummer"    required />
    <input name="days"         placeholder="Antal dagar"   type="number" required />
    <input name="price"        placeholder="Pris (kr)"     type="number" required />
    <button type="submit">Skapa kurs</button>
  </form>

  <p id="status-message"></p>

  <h2>Bokningar per kurs</h2>
  <div id="booking-list">Laddar...</div>

  <script type="module" src="/js/admin.js"></script>
</body>
</html>
